name: Build & Publish Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build, release, and update manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version
        id: vars
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          IFS='.' read -ra PARTS <<< "$RAW"
          FOUR="${PARTS[0]:-1}.${PARTS[1]:-0}.${PARTS[2]:-0}.${PARTS[3]:-0}"
          echo "version=$FOUR"           >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME"    >> "$GITHUB_OUTPUT"
          echo "zip=preroll_${FOUR}.zip" >> "$GITHUB_OUTPUT"

      - name: Restore & build
        run: |
          dotnet restore Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj
          dotnet publish Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj \
            --configuration Release \
            --no-self-contained \
            --output ./publish \
            /p:AssemblyVersion=${{ steps.vars.outputs.version }} \
            /p:FileVersion=${{ steps.vars.outputs.version }}

      - name: Create zip artifact
        run: |
          cd publish
          zip -j "../${{ steps.vars.outputs.zip }}" Jellyfin.Plugin.PreRoll.dll

      - name: Compute MD5 checksum
        id: hash
        run: |
          MD5=$(md5sum "${{ steps.vars.outputs.zip }}" | awk '{print $1}')
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Pre-Roll Videos ${{ steps.vars.outputs.tag }}"
          body: |
            ## Pre-Roll Videos ${{ steps.vars.outputs.tag }}

            Add this URL to Jellyfin → Plugins → Repositories:
```
            https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
```
          files: ${{ steps.vars.outputs.zip }}

      - name: Update manifest.json
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.tag }}/${{ steps.vars.outputs.zip }}"
          python3 scripts/update_manifest.py \
            --version  "${{ steps.vars.outputs.version }}" \
            --url      "$DOWNLOAD_URL" \
            --checksum "${{ steps.hash.outputs.md5 }}" \
            --repo     "${{ github.repository }}"

      - name: Commit manifest.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update manifest.json for ${{ steps.vars.outputs.tag }}"
          file_pattern: manifest.json
          branch: main
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
